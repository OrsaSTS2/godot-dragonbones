name: 🛠️ Builds
on: [push, pull_request, merge_group]

concurrency:
    group: ${{ github.workflow }}|${{ github.ref_name }}
    cancel-in-progress: true

jobs:
    build:
        runs-on: ${{ matrix.runner }}
        name: ${{ matrix.name }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - identifier: windows-x64-debug
                      name: 🏁 Windows x64 Debug
                      runner: windows-latest
                      target: template_debug
                      debug_symbols: yes
                      platform: windows
                      arch: x86_64
                    - identifier: windows-x64-release
                      name: 🏁 Windows x64 Release
                      runner: windows-latest
                      target: template_release
                      debug_symbols: no
                      platform: windows
                      arch: x86_64
                    - identifier: linux-x64-debug
                      name: 🐧 Linux x64 Debug
                      runner: ubuntu-latest
                      target: template_debug
                      debug_symbols: yes
                      platform: linux
                      arch: x86_64
                    - identifier: linux-x64-release
                      name: 🐧 Linux x64 Release
                      runner: ubuntu-latest
                      target: template_release
                      debug_symbols: no
                      platform: linux
                      arch: x86_64
                    - identifier: macos-universal-debug
                      name: 🍎 macOS (universal) Debug
                      runner: macos-latest
                      target: template_debug
                      debug_symbols: yes
                      platform: macos
                      arch: universal
                    - identifier: macos-universal-release
                      name: 🍎 macOS (universal) Release
                      runner: macos-latest
                      target: template_release
                      debug_symbols: no
                      platform: macos
                      arch: universal

        env:
          SCONS_CACHE: ${{ github.workspace }}/.scons-cache/

        steps:
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.x"

            - name: Set up SCons
              shell: bash
              run: |
                  python -c "import sys; print(sys.version)"
                  python -m pip install scons==4.4
                  scons --version

            - name: Checkout project
              uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: (Windows) Install mingw64
              if: ${{ matrix.platform == 'windows' }}
              uses: e-t-l/setup-mingw@patch-1

            - name: (Linux) Install dependencies
              if: ${{ matrix.platform == 'linux' }}
              run: |
                  sudo apt-get update -qq
                  sudo apt-get install -qqq build-essential pkg-config

            - name: Compile extension
              shell: sh
              env:
                  SCONS_CACHE: ${{ github.workspace }}/.scons-cache/
                  SCONS_CACHE_LIMIT: 7168
              run: |
                  scons target='${{ matrix.target }}' platform='${{ matrix.platform }}' arch='${{ matrix.arch }}' debug_symbols=${{ matrix.debug_symbols }}

            - name: Copy to artifacts directory
              shell: bash
              run: |
                  mkdir -p ./artifact/addons
                  cp -r ./.godot-project/addons/. ./artifact/addons/

            - name: Upload artifact ${{ matrix.platform }}-${{ matrix.target }}-${{ matrix.arch }}
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ github.event.repository.name }}-${{ github.sha }}-${{ matrix.platform }}-${{ matrix.target }}-${{ matrix.arch }}
                  path: |
                      ./artifact/
                  retention-days: 14

    merge_artifacts:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Checkout project
              uses: actions/checkout@v4
              with:
                  submodules: false

            - name: Setup version
              run: |
                echo BUILD_VERSION=$(head -n 1 ./version.txt) >> $GITHUB_ENV

            - name: Merge Artifacts to all in one
              uses: actions/upload-artifact/merge@v4
              with:
                  name: ${{ github.event.repository.name }}-all-platforms-${{ env.BUILD_VERSION }}-${{ github.sha }}
                  pattern: ${{ github.event.repository.name }}-${{ github.sha }}*
                  delete-merged: true
                  retention-days: 90
